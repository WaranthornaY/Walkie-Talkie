<!DOCTYPE html>
<html>

<head>

<title>Game Radio v2</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>


<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


.screen{
    display:none;
}


.active{
    display:block;
}



input{

    font-size:22px;
    padding:10px;
    width:220px;
    text-align:center;
    margin:8px;

}



button{

    font-size:20px;
    padding:15px;
    margin:8px;
    border-radius:15px;
    border:none;

}



#create{

background:#2196f3;
color:white;

}


#join{

background:#673ab7;
color:white;

}



/* tuning knob */

#knob{

width:180px;
height:180px;

border-radius:50%;

background:#444;

margin:30px auto;

font-size:40px;

display:flex;

align-items:center;

justify-content:center;

user-select:none;

touch-action:none;

}



#talk{

width:210px;
height:210px;

border-radius:50%;

background:green;

color:white;

font-size:35px;

}



#talk:active{

background:red;

transform:scale(.9);

}



#emergency{

background:red;
color:white;

}


#dead{

background:black;
color:white;

}


#alive{

background:green;
color:white;

}


#mute{

background:orange;

}


#exit{

background:#990000;
color:white;

}



#players,
#chat{

background:#222;

border-radius:15px;

padding:15px;

margin:15px;

text-align:left;

height:180px;

overflow:auto;

}



</style>

</head>


<body>



<div id="start" class="screen active">


<h1>🎮 GAME RADIO</h1>


<input id="name" placeholder="Player Name">


<br>


<button id="create">
CREATE ROOM
</button>


<button id="join">
JOIN ROOM
</button>


<br>


<input id="roomInput" placeholder="Room Code">



</div>





<div id="tuning" class="screen">


<h1>📻 TUNING</h1>


<div id="knob">
◉
</div>


<h2 id="channel">
Channel: ----
</h2>


<h3 id="signal">
Searching...
</h3>



<button id="connect">
CONNECT
</button>


</div>





<div id="radio" class="screen">


<h1>
🎮 RADIO
</h1>


<h2 id="roomText"></h2>


<div id="players">

Players:

</div>



<div id="chat">

Chat:

</div>



<button id="talk">

🎤
<br>
TALK

</button>


<br>


<button id="emergency">
🚨 HELP
</button>


<button id="dead">
💀 DEAD
</button>


<button id="alive">
✅ ALIVE
</button>


<br>


<button id="mute">
🔊 MUTE
</button>


<button id="exit">
🚪 EXIT
</button>


<audio id="audio" autoplay></audio>


</div>
<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,

ref,

set,

get,

push,

onValue,

remove,

onDisconnect

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};



const app =
initializeApp(firebaseConfig);


const db =
getDatabase(app);



let peer;

let myPeerID;

let stream;

let roomCode;

let playerName;

let playerID;


let remoteAudio =
document.getElementById("audio");



let selectedRoom="";





function showScreen(id){

document.querySelectorAll(".screen")
.forEach(x=>x.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}





function randomID(){

return Math.random()
.toString(36)
.substring(2,10);

}





function randomRoom(){

return Math.floor(
1000+Math.random()*9000
);

}







async function getMic(){

stream =
await navigator.mediaDevices.getUserMedia({

audio:true

});


stream.getAudioTracks()[0].enabled=false;

}





function startPeer(){


peer=new Peer();



peer.on("open",id=>{

myPeerID=id;

});



peer.on("call",incoming=>{


incoming.answer(stream);



incoming.on("stream",audio=>{

remoteAudio.srcObject=audio;

});


});


}









function addMessage(text){


push(

ref(
db,
"rooms/"+roomCode+"/messages"
),

{

text:text,

time:Date.now()

}

);


}









function watchPlayers(){


onValue(

ref(
db,
"rooms/"+roomCode+"/players"
),

snap=>{


let box =
document.getElementById("players");


box.innerHTML =
"Players:<br>";



let data=snap.val();



if(data){


Object.values(data)
.forEach(p=>{


box.innerHTML +=

(p.online?
"🟢 ":"🔴 ")

+p.name+
"<br>";


});


}


});


}









function watchChat(){


onValue(

ref(
db,
"rooms/"+roomCode+"/messages"
),

snap=>{


let box =
document.getElementById("chat");


box.innerHTML="Chat:<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+
"<br>";


});


}


});


}









async function createPlayer(){


playerID=randomID();



await set(

ref(
db,
"rooms/"+roomCode+"/players/"+playerID
),

{

name:playerName,

peer:myPeerID,

online:true

}

);



onDisconnect(

ref(
db,
"rooms/"+roomCode+"/players/"+playerID

)

)

.update({

online:false

});


}







document.getElementById("create")
.onclick=async()=>{


playerName=
document.getElementById("name").value;



if(!playerName){

alert("Enter name");

return;

}



await getMic();


startPeer();



peer.on("open",async id=>{


roomCode=randomRoom();


await set(

ref(
db,
"rooms/"+roomCode
),

{

created:true

}

);



await createPlayer();



document.getElementById("channel")
.innerHTML=

"Channel: "+roomCode;



showScreen("tuning");



});


};

document.getElementById("join")
.onclick=async()=>{


playerName=
document.getElementById("name").value;


roomCode=
document.getElementById("roomInput").value;



if(!playerName || !roomCode){

alert("Enter name and room");

return;

}



let room =
await get(

ref(
db,
"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



await getMic();


startPeer();



peer.on("open",async id=>{


await createPlayer();



document.getElementById("channel")
.innerHTML=

"Channel: "+roomCode;



showScreen("tuning");



});



};









let knob =
document.getElementById("knob");


let channelNumber=0;


knob.onpointermove=e=>{


if(e.buttons){


channelNumber += e.movementX;



if(channelNumber<0)

channelNumber=0;


if(channelNumber>9999)

channelNumber=9999;



document.getElementById("channel")
.innerHTML=

"Channel: "+channelNumber;



}



};









document.getElementById("connect")
.onclick=async()=>{


document.getElementById("signal")
.innerHTML=
"Connecting...";



await new Promise(r=>setTimeout(r,1000));



document.getElementById("signal")
.innerHTML=
"📡 Signal Found";



await new Promise(r=>setTimeout(r,800));



showScreen("radio");



document.getElementById("roomText")
.innerHTML=

"Channel "+roomCode;



addMessage(

"🟢 "+playerName+" connected"

);



watchPlayers();

watchChat();



connectVoice();



};









function connectVoice(){


onValue(

ref(
db,
"rooms/"+roomCode+"/players"

),

snap=>{


let players=snap.val();



if(!players)
return;



Object.values(players)
.forEach(p=>{


if(
p.peer &&
p.peer!==myPeerID
){



let c =
peer.call(
p.peer,
stream
);



c.on("stream",audio=>{

remoteAudio.srcObject=audio;

});


}



});



});


}

const talk =
document.getElementById("talk");



function talkOn(){

if(stream){

stream.getAudioTracks()[0].enabled=true;

}

}



function talkOff(){

if(stream){

stream.getAudioTracks()[0].enabled=false;

}

}




talk.onmousedown=talkOn;

talk.onmouseup=talkOff;


talk.ontouchstart=e=>{

e.preventDefault();

talkOn();

};


talk.ontouchend=e=>{

e.preventDefault();

talkOff();

};








async function sendStatus(text){


addMessage(

text

);


}







document.getElementById("emergency")
.onclick=()=>{


sendStatus(

"🚨 "+playerName+" needs help!"

);


};






document.getElementById("dead")
.onclick=()=>{


sendStatus(

"💀 "+playerName+" is dead!"

);


};






document.getElementById("alive")
.onclick=()=>{


sendStatus(

"✅ "+playerName+" is alive!"

);


};








let muted=false;



document.getElementById("mute")
.onclick=()=>{


muted=!muted;


remoteAudio.muted=muted;



document.getElementById("mute")
.innerHTML=

muted ?

"🔇 UNMUTE":

"🔊 MUTE";


};









document.getElementById("exit")
.onclick=async()=>{


if(roomCode && playerID){


await set(

ref(
db,
"rooms/"+roomCode+"/players/"+playerID

),

{

name:playerName,

online:false

}

);



addMessage(

"🔴 "+playerName+" left"

);



}



if(peer){

peer.destroy();

}



location.reload();


};





</script>


</body>

</html>
