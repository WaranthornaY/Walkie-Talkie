<!DOCTYPE html>
<html>
<head>
<title>Game Walkie Talkie</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    font-size:32px;
}

button{
    font-size:20px;
    padding:15px;
    margin:8px;
    border-radius:15px;
    border:none;
}

input{
    font-size:22px;
    padding:10px;
    width:180px;
    text-align:center;
}

#talk{
    width:200px;
    height:200px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:35px;
    font-weight:bold;
    user-select:none;
    touch-action:none;
}

#talk:active{
    transform:scale(0.9);
    background:red;
}

#mute{
    background:orange;
}

#exit{
    background:red;
    color:white;
}

#create{
    background:#2196f3;
    color:white;
}

#join{
    background:#673ab7;
    color:white;
}

</style>

</head>


<body>


<h1>🎙️ Game Walkie Talkie</h1>


<h2 id="status">
Disconnected
</h2>


<input id="room" placeholder="Room Code">


<br>


<button id="create">
Create Room
</button>


<button id="join">
Join Room
</button>


<h2 id="code"></h2>


<hr>


<button id="talk">
🎤<br>
TALK
</button>


<br>


<button id="mute">
🔊 Mute Speaker
</button>


<br>


<button id="exit">
🚪 Exit Room
</button>


<audio id="audio" autoplay></audio>



<script type="module">


import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
getDatabase,
ref,
set,
get,
onValue,
remove
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


let peer;

let stream;

let call;

let roomCode;

let remoteAudio =
document.getElementById("audio");

async function getMic(){

    stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    stream.getAudioTracks()[0].enabled = false;

    document.getElementById("status").innerHTML =
    "Microphone ready";
}



function createPeer(){

    peer = new Peer();

    peer.on("call", incoming => {

        incoming.answer(stream);

        incoming.on("stream", audio => {

            remoteAudio.srcObject = audio;

        });

        call = incoming;

    });

}



function makeRoom(){

    return Math.floor(
        1000 + Math.random() * 9000
    );

}



document.getElementById("create").onclick = async()=>{


    await getMic();


    createPeer();


    peer.on("open", async id=>{


        roomCode = makeRoom();


        await set(
            ref(db,"rooms/"+roomCode),
            {
                host:id
            }
        );


        document.getElementById("code").innerHTML =
        "Room: " + roomCode;


        document.getElementById("status").innerHTML =
        "Waiting for player";


        onValue(
            ref(db,"rooms/"+roomCode+"/guest"),
            snap=>{


                let guest = snap.val();


                if(guest){


                    call = peer.call(
                        guest,
                        stream
                    );


                    call.on("stream", audio=>{

                        remoteAudio.srcObject = audio;

                    });


                    document.getElementById("status").innerHTML =
                    "Connected";

                }


            }
        );


    });


};






document.getElementById("join").onclick = async()=>{


    await getMic();


    roomCode =
    document.getElementById("room").value;


    let room =
    await get(
        ref(db,"rooms/"+roomCode)
    );


    if(!room.exists()){

        alert("Room not found");

        return;

    }



    createPeer();



    peer.on("open", async id=>{


        await set(
            ref(db,"rooms/"+roomCode+"/guest"),
            id
        );



        call =
        peer.call(
            room.val().host,
            stream
        );



        call.on("stream", audio=>{

            remoteAudio.srcObject = audio;

        });



        document.getElementById("status").innerHTML =
        "Connected";


    });


};








let talk =
document.getElementById("talk");



function talkOn(){

    if(stream){

        stream.getAudioTracks()[0].enabled = true;

    }

}



function talkOff(){

    if(stream){

        stream.getAudioTracks()[0].enabled = false;

    }

}



talk.onmousedown = talkOn;

talk.onmouseup = talkOff;


talk.ontouchstart = e=>{

    e.preventDefault();

    talkOn();

};



talk.ontouchend = e=>{

    e.preventDefault();

    talkOff();

};







let muted = false;


document.getElementById("mute").onclick = ()=>{


    muted = !muted;


    remoteAudio.muted = muted;



    document.getElementById("mute").innerHTML =
    muted ?
    "🔇 Unmute Speaker" :
    "🔊 Mute Speaker";


};








document.getElementById("exit").onclick = async()=>{


    if(roomCode){

        await remove(
            ref(db,"rooms/"+roomCode)
        );

    }



    if(peer){

        peer.destroy();

    }



    location.reload();


};


</script>


</body>
</html>
