<!DOCTYPE html>
<html>
<head>

<title>Walkie Talkie</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial;
    background:#222;
    color:white;
    text-align:center;
}

button,input {
    font-size:20px;
    padding:12px;
    margin:10px;
}

#talk {
    width:220px;
    height:220px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:30px;
    border:none;
}

#talk:active {
    background:green;
}

#controls {
    display:none;
}

</style>

</head>


<body>

<h1>🎙️ Walkie Talkie</h1>


<div id="setup">

<button onclick="createRoom()">
Create Room
</button>

<h2 id="myRoom"></h2>


<input id="joinCode" placeholder="Room Code">

<button onclick="joinRoom()">
Join Room
</button>

</div>




<div id="controls">

<button id="talk">
🎤 HOLD
<br>
TO TALK
</button>


<br>


<button id="muteBtn" onclick="mute()">
🔇 MUTE
</button>


<button onclick="exitRoom()">
🚪 EXIT ROOM
</button>


</div>



<h3 id="status">
Waiting...
</h3>



<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>


<script>


let peer;

let myStream;

let currentCall;

let remoteAudio;

let speakerMuted=false;





// Microphone


navigator.mediaDevices.getUserMedia({

    audio:true

})

.then(stream=>{


    myStream=stream;


    // Start muted

    myStream
    .getAudioTracks()[0]
    .enabled=false;


})

.catch(()=>{

    alert("Microphone permission denied");

});







function createRoom(){


let room =
Math.floor(
10000 + Math.random()*90000
).toString();



startPeer(room);


}








function startPeer(id){


peer=new Peer(id);



peer.on("open",()=>{


document.getElementById("myRoom").innerHTML=

"Room Code: "+id;


document.getElementById("status").innerHTML=

"Waiting for friend...";


});







peer.on("call",call=>{


currentCall=call;


call.answer(myStream);



call.on("stream",stream=>{


playAudio(stream);


connected();


});


});



}








function joinRoom(){


let room =
document.getElementById("joinCode").value;



if(room==""){

alert("Enter room code");

return;

}



let guestID =
"guest-"+Math.floor(Math.random()*999999);



startPeer(guestID);



setTimeout(()=>{


let call =
peer.call(room,myStream);



currentCall=call;



call.on("stream",stream=>{


playAudio(stream);


connected();


});


},2000);



}









function playAudio(stream){


remoteAudio =
document.createElement("audio");


remoteAudio.srcObject=stream;


remoteAudio.autoplay=true;


document.body.appendChild(remoteAudio);


}








function connected(){


document.getElementById("setup")
.style.display="none";


document.getElementById("controls")
.style.display="block";


document.getElementById("status")
.innerHTML="Connected 🎧";


}










// HOLD TO TALK


let talk =
document.getElementById("talk");



function talkOn(){


if(myStream){


myStream
.getAudioTracks()[0]
.enabled=true;



document.getElementById("status")
.innerHTML="🎤 Talking";


}


}



function talkOff(){


if(myStream){


myStream
.getAudioTracks()[0]
.enabled=false;



document.getElementById("status")
.innerHTML="🔊 Listening";


}


}



talk.onmousedown=talkOn;

talk.onmouseup=talkOff;



talk.ontouchstart=(e)=>{

e.preventDefault();

talkOn();

};



talk.ontouchend=(e)=>{

e.preventDefault();

talkOff();

};










// SPEAKER MUTE


function mute(){


speakerMuted=!speakerMuted;



if(remoteAudio){

remoteAudio.muted=speakerMuted;

}



if(speakerMuted){


document.getElementById("muteBtn")
.innerHTML="🔊 UNMUTE";


document.getElementById("status")
.innerHTML="🔇 Speaker Muted";


}

else{


document.getElementById("muteBtn")
.innerHTML="🔇 MUTE";


document.getElementById("status")
.innerHTML="🔊 Speaker On";


}


}










function exitRoom(){



if(currentCall){

currentCall.close();

}



if(peer){

peer.destroy();

}



if(myStream){

myStream
.getTracks()
.forEach(track=>track.stop());

}



location.reload();


}



</script>


</body>
</html>
