<!DOCTYPE html>
<html>
<head>
<title>Walkie Talkie</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background:#202020;
    color:white;
    text-align:center;
}

button,input {
    font-size:20px;
    padding:12px;
    margin:10px;
}

#talk {
    width:220px;
    height:220px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:30px;
}

#talk:active {
    background:green;
}

</style>
</head>

<body>

<h1>🎙️ Walkie Talkie</h1>

<button onclick="createRoom()">Create Room</button>

<h2 id="myRoom"></h2>


<input id="joinCode" placeholder="Room Code">

<button onclick="joinRoom()">Join</button>


<br>

<button id="talk">
HOLD<br>TO TALK
</button>


<h3 id="status">
Waiting...
</h3>



<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>


<script>

let peer;
let myStream;
let currentCall;



// microphone

navigator.mediaDevices.getUserMedia({
    audio:true
})
.then(stream=>{

    myStream=stream;

    // mute first
    myStream.getAudioTracks()[0].enabled=false;

})
.catch(e=>{
    alert("Microphone permission denied");
});





function createRoom(){

    let code=Math.floor(
        10000+Math.random()*90000
    ).toString();


    startPeer(code);


}





function startPeer(id){


peer=new Peer(id);



peer.on("open",()=>{

document.getElementById("myRoom").innerHTML=
"Room Code: "+id;

document.getElementById("status").innerHTML=
"Waiting for friend...";


});





peer.on("call",call=>{


currentCall=call;


call.answer(myStream);



call.on("stream",stream=>{

playAudio(stream);

});



document.getElementById("status").innerHTML=
"Connected 🎧";


});



}







function joinRoom(){


let code=
document.getElementById("joinCode").value;


if(code==""){

alert("Enter room code");

return;

}



startPeer(
"guest-"+Math.floor(Math.random()*99999)
);



setTimeout(()=>{


let call=peer.call(
code,
myStream
);


currentCall=call;



call.on("stream",stream=>{

playAudio(stream);

});



document.getElementById("status").innerHTML=
"Connected 🎧";


},2000);



}






function playAudio(stream){

let audio=document.createElement("audio");

audio.srcObject=stream;

audio.autoplay=true;

document.body.appendChild(audio);

}








// Push to talk


let button=document.getElementById("talk");



function talkOn(){

if(myStream){

myStream
.getAudioTracks()[0]
.enabled=true;


document.getElementById("status").innerHTML=
"🎤 Talking";

}

}



function talkOff(){

if(myStream){

myStream
.getAudioTracks()[0]
.enabled=false;


document.getElementById("status").innerHTML=
"🔇 Listening";

}

}



button.onmousedown=talkOn;
button.onmouseup=talkOff;


button.ontouchstart=(e)=>{
e.preventDefault();
talkOn();
};


button.ontouchend=(e)=>{
e.preventDefault();
talkOff();
};


</script>

</body>
</html>
