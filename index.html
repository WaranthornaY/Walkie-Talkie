<!DOCTYPE html>
<html>
<head>

<title>Game Radio</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

input{
    font-size:20px;
    padding:10px;
    width:220px;
    margin:5px;
    text-align:center;
}

button{
    font-size:20px;
    padding:15px;
    margin:8px;
    border-radius:15px;
    border:none;
}


#create{
    background:#2196f3;
    color:white;
}


#join{
    background:#673ab7;
    color:white;
}


#talk{

    width:200px;
    height:200px;
    border-radius:50%;
    background:#00aa00;
    color:white;
    font-size:35px;
    font-weight:bold;

    touch-action:none;
}


#talk:active{

    background:red;
    transform:scale(0.9);

}


#emergency{
    background:red;
    color:white;
}


#dead{

    background:black;
    color:white;

}


#alive{

    background:green;
    color:white;

}


#mute{

    background:orange;

}


#exit{

    background:#990000;
    color:white;

}


#chat{

    background:#222;
    border-radius:15px;
    padding:15px;
    height:250px;
    overflow-y:auto;
    text-align:left;
    margin:15px;

}


</style>

</head>


<body>


<h1>🎮 GAME RADIO</h1>


<input id="name" placeholder="Player Name">

<br>

<input id="room" placeholder="Room Code">


<br>


<button id="create">
Create Room
</button>


<button id="join">
Join Room
</button>


<h2 id="roomDisplay"></h2>


<h3 id="status">
Disconnected
</h3>



<div id="chat">
Waiting...
</div>


<hr>


<button id="talk">
🎤<br>
TALK
</button>


<br>


<button id="emergency">
🚨 NEED HELP
</button>


<button id="dead">
💀 DEAD
</button>


<button id="alive">
✅ ALIVE
</button>


<br>


<button id="mute">
🔊 Mute
</button>


<button id="exit">
🚪 Exit
</button>



<audio id="audio" autoplay></audio>
<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
getDatabase,
ref,
set,
get,
push,
onValue,
remove
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};



const app =
initializeApp(firebaseConfig);


const db =
getDatabase(app);



let peer;

let stream;

let call;

let roomCode;

let playerName;

let remoteAudio =
document.getElementById("audio");


let chat =
document.getElementById("chat");






function addChat(text){

    let p=document.createElement("p");

    p.innerHTML=text;

    chat.appendChild(p);

    chat.scrollTop=chat.scrollHeight;

}





async function getMic(){

    stream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });


    stream.getAudioTracks()[0].enabled=false;

}






function startPeer(){


    peer=new Peer();


    peer.on("call",incoming=>{


        incoming.answer(stream);


        incoming.on("stream",audio=>{

            remoteAudio.srcObject=audio;

        });


        call=incoming;


    });


}







function newRoom(){

    return Math.floor(
        1000 + Math.random()*9000
    );

}







async function sendEvent(message){


    await push(

        ref(
            db,
            "rooms/"+roomCode+"/messages"
        ),

        {
            text:message,
            time:Date.now()
        }

    );


}







function listenChat(){


onValue(

ref(
db,
"rooms/"+roomCode+"/messages"
),

snap=>{


chat.innerHTML="";


let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{

addChat(m.text);

});


}



});



}







document.getElementById("create").onclick =
async()=>{


playerName =
document.getElementById("name").value;



if(!playerName){

alert("Enter name");

return;

}



await getMic();


startPeer();



peer.on("open",async id=>{


roomCode=newRoom();



await set(

ref(
db,
"rooms/"+roomCode
),

{

host:id

}

);




document.getElementById("roomDisplay")
.innerHTML=
"Room: "+roomCode;



document.getElementById("status")
.innerHTML=
"Waiting";



await sendEvent(
"🟢 "+playerName+" joined"
);



listenChat();



watchPlayer();


});



};







function watchPlayer(){


onValue(

ref(
db,
"rooms/"+roomCode+"/guest"
),

snap=>{


let guest=snap.val();


if(guest){


call =
peer.call(
guest,
stream
);



call.on("stream",audio=>{

remoteAudio.srcObject=audio;

});



document.getElementById("status")
.innerHTML=
"🟢 Connected";


}



});


}


document.getElementById("join").onclick =
async()=>{


playerName =
document.getElementById("name").value;



if(!playerName){

alert("Enter name");

return;

}



roomCode =
document.getElementById("room").value;



if(!roomCode){

alert("Enter room code");

return;

}



await getMic();



let room =
await get(
ref(db,"rooms/"+roomCode)
);



if(!room.exists()){

alert("Room not found");

return;

}



startPeer();



peer.on("open",async id=>{


await set(

ref(
db,
"rooms/"+roomCode+"/guest"
),

id

);



call =
peer.call(

room.val().host,

stream

);



call.on("stream",audio=>{

remoteAudio.srcObject=audio;

});



document.getElementById("status")
.innerHTML=
"🟢 Connected";



await sendEvent(

"🟢 "+playerName+" joined"

);



listenChat();



});



};







document.getElementById("emergency").onclick =
()=>{


sendEvent(

"🚨 "+playerName+" needs help!"

);


};







document.getElementById("dead").onclick =
()=>{


sendEvent(

"💀 "+playerName+" is dead!"

);


};







document.getElementById("alive").onclick =
()=>{


sendEvent(

"✅ "+playerName+" is alive!"

);


};


const talk =
document.getElementById("talk");


function talkOn(){

    if(stream){

        stream.getAudioTracks()[0].enabled=true;

    }

}



function talkOff(){

    if(stream){

        stream.getAudioTracks()[0].enabled=false;

    }

}





talk.onmousedown=()=>{

    talkOn();

};



talk.onmouseup=()=>{

    talkOff();

};




talk.ontouchstart=e=>{

    e.preventDefault();

    talkOn();

};



talk.ontouchend=e=>{

    e.preventDefault();

    talkOff();

};








let muted=false;



document.getElementById("mute").onclick=()=>{


muted=!muted;


remoteAudio.muted=muted;



document.getElementById("mute").innerHTML =

muted ?

"🔇 Unmute":

"🔊 Mute";


};









document.getElementById("exit").onclick =
async()=>{


if(roomCode){


await sendEvent(

"🔴 "+playerName+" left"

);



await remove(

ref(
db,
"rooms/"+roomCode

)

);


}



if(peer){

peer.destroy();

}



location.reload();


};



</script>


</body>

</html>
