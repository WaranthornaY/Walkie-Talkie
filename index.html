<!DOCTYPE html>
<html>
<head>

<title>Game Walkie Talkie</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

input{
    font-size:20px;
    padding:10px;
    width:200px;
    text-align:center;
    margin:5px;
}

button{
    font-size:20px;
    padding:15px;
    margin:8px;
    border-radius:15px;
    border:none;
}

#talk{
    width:200px;
    height:200px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:35px;
    font-weight:bold;
    touch-action:none;
}

#talk:active{
    transform:scale(0.9);
    background:red;
}

#create{
    background:#2196f3;
    color:white;
}

#join{
    background:#673ab7;
    color:white;
}

#emergency{
    background:red;
    color:white;
}

#dead{
    background:black;
    color:white;
}

#alive{
    background:green;
    color:white;
}

#mute{
    background:orange;
}

#exit{
    background:#900;
    color:white;
}


#messageBox{

    background:#222;
    padding:15px;
    margin:20px;
    border-radius:15px;
    min-height:50px;

}


</style>

</head>


<body>


<h1>🎮 Game Radio</h1>


<input id="name" placeholder="Player Name">


<br>


<input id="room" placeholder="Room Code">


<br>


<button id="create">
Create Room
</button>


<button id="join">
Join Room
</button>


<h2 id="code"></h2>


<h2 id="status">
Disconnected
</h2>


<div id="messageBox">
Waiting...
</div>


<hr>


<button id="talk">
🎤<br>
TALK
</button>


<br>


<button id="emergency">
🚨 EMERGENCY
</button>


<button id="dead">
💀 DEAD
</button>


<button id="alive">
✅ ALIVE
</button>


<br>


<button id="mute">
🔊 Mute Speaker
</button>


<button id="exit">
🚪 Exit
</button>


<audio id="audio" autoplay></audio>
<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
onValue,
remove
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



let peer;

let stream;

let call;

let roomCode;

let playerName;


let remoteAudio =
document.getElementById("audio");


let messageBox =
document.getElementById("messageBox");





async function getMic(){

    stream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });


    stream.getAudioTracks()[0].enabled=false;

}






function startPeer(){


    peer = new Peer();



    peer.on("call",incoming=>{


        incoming.answer(stream);


        incoming.on("stream",audio=>{

            remoteAudio.srcObject=audio;

        });


        call=incoming;


    });


}





function randomRoom(){

    return Math.floor(
        1000 + Math.random()*9000
    );

}







function showMessage(text){

    messageBox.innerHTML=text;

}








document.getElementById("create").onclick =
async()=>{


playerName =
document.getElementById("name").value;


if(playerName==""){

alert("Enter name");

return;

}



await getMic();


startPeer();



peer.on("open",async id=>{


roomCode=randomRoom();



await set(
ref(db,"rooms/"+roomCode),
{

host:id,

hostName:playerName,

status:"online"

}
);



document.getElementById("code").innerHTML =
"Room: "+roomCode;



document.getElementById("status").innerHTML =
"Waiting for player";



watchRoom();



});



};









function watchRoom(){


onValue(
ref(db,"rooms/"+roomCode),
snap=>{


let data=snap.val();



if(!data)
return;



if(data.guest){


call =
peer.call(
data.guest,
stream
);



call.on("stream",audio=>{

remoteAudio.srcObject=audio;

});



document.getElementById("status")
.innerHTML=
"🟢 Connected";



}



if(data.message){


showMessage(
data.message
);


}


});

}








document.getElementById("join").onclick =
async()=>{


playerName =
document.getElementById("name").value;


if(playerName==""){

alert("Enter name");

return;

}



await getMic();


roomCode =
document.getElementById("room").value;



let room =
await get(
ref(db,"rooms/"+roomCode)
);



if(!room.exists()){

alert("Room not found");

return;

}



startPeer();



peer.on("open",async id=>{


await set(
ref(db,"rooms/"+roomCode+"/guest"),
id
);



await set(
ref(db,"rooms/"+roomCode+"/guestName"),
playerName
);



call =
peer.call(
room.val().host,
stream
);



call.on("stream",audio=>{

remoteAudio.srcObject=audio;

});



document.getElementById("status")
.innerHTML=
"🟢 Connected";



watchRoom();


});



};

const talk =
document.getElementById("talk");


function talkOn(){

    if(stream){

        stream.getAudioTracks()[0].enabled=true;

    }

}



function talkOff(){

    if(stream){

        stream.getAudioTracks()[0].enabled=false;

    }

}




talk.onmousedown=talkOn;

talk.onmouseup=talkOff;


talk.ontouchstart=e=>{

    e.preventDefault();

    talkOn();

};



talk.ontouchend=e=>{

    e.preventDefault();

    talkOff();

};








async function sendMessage(msg){


if(!roomCode)
return;



await set(
ref(db,"rooms/"+roomCode+"/message"),
playerName+" "+msg
);



}






document.getElementById("emergency").onclick=()=>{

sendMessage(
"🚨 NEEDS HELP!"
);

};





document.getElementById("dead").onclick=()=>{

sendMessage(
"💀 IS DEAD"
);

};





document.getElementById("alive").onclick=()=>{

sendMessage(
"✅ IS ALIVE"
);

};








let muted=false;


document.getElementById("mute").onclick=()=>{


muted=!muted;


remoteAudio.muted=muted;



document.getElementById("mute").innerHTML =
muted ?
"🔇 Unmute Speaker" :
"🔊 Mute Speaker";


};









document.getElementById("exit").onclick=async()=>{


if(roomCode){

await remove(
ref(db,"rooms/"+roomCode)
);

}



if(peer){

peer.destroy();

}



location.reload();


};



</script>


</body>

</html>
