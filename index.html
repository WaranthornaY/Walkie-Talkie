<!DOCTYPE html>
<html>

<head>

<title>Game Radio v3</title>

<meta name="viewport" content="width=device-width,initial-scale=1">


<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>


<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}


.screen{

display:none;

}


.active{

display:block;

}


input,button{

font-size:20px;
padding:12px;
margin:8px;
border-radius:12px;

}


button{

border:none;

}



#create{

background:#2196f3;
color:white;

}



#join{

background:#673ab7;
color:white;

}



#adminLogin{

background:#444;
color:white;

}



#talk{

width:200px;
height:200px;
border-radius:50%;
background:green;
color:white;
font-size:35px;

}



#adminTalk{

width:200px;
height:200px;
border-radius:50%;
background:gold;
font-size:30px;

}



#camera{

background:#2196f3;
color:white;

}



#stopCamera{

background:red;
color:white;

}



#help{

background:red;
color:white;

}



#dead{

background:black;
color:white;

}



#alive{

background:green;
color:white;

}



#players,
#chat,
#adminPlayers{

background:#222;
margin:15px;
padding:15px;
border-radius:15px;
height:180px;
overflow:auto;
text-align:left;

}



video{

width:90%;
max-width:500px;
border-radius:20px;

}


</style>

</head>



<body>



<!-- PLAYER LOGIN -->

<div id="start" class="screen active">


<h1>📻 GAME RADIO</h1>


<input id="name" placeholder="Player name">


<br>


<input id="room" placeholder="Room code">


<br>


<button id="create">
CREATE ROOM
</button>


<button id="join">
JOIN ROOM
</button>



<br>


<button id="adminLogin">
👑 ADMIN LOGIN
</button>



</div>







<!-- PLAYER RADIO -->


<div id="radio" class="screen">


<h1>📻 RADIO</h1>


<h2 id="roomText"></h2>


<div id="players">
👥 Players
</div>


<div id="chat">
💬 Chat
</div>



<button id="talk">

🎤
<br>
TALK

</button>



<br>



<button id="camera">
📹 START BODYCAM
</button>


<button id="stopCamera">
⛔ STOP BODYCAM
</button>



<br>


<button id="help">
🚨 HELP
</button>


<button id="dead">
💀 DEAD
</button>


<button id="alive">
✅ ALIVE
</button>



</div>







<!-- ADMIN LOGIN -->


<div id="adminLoginScreen" class="screen">


<h1>👑 ADMIN LOGIN</h1>


<input id="adminCode" placeholder="Code">


<br>


<input id="adminRoom" placeholder="Room">


<br>


<button id="adminEnter">

ENTER

</button>


</div>








<!-- ADMIN PANEL -->


<div id="admin" class="screen">


<h1>👑 ADMIN PANEL</h1>


<h2 id="adminRoomText"></h2>


<div id="adminPlayers">

Players

</div>



<div id="cameraView">

</div>



<button id="adminTalk">

👑
<br>
TALK ALL

</button>



</div>







<audio id="audio" autoplay></audio>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
set,
get,
push,
onValue,
onDisconnect,
update

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";





const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);






let peer;

let myPeerID="";

let playerID="";

let playerName="";

let roomCode="";


let audioStream;

let cameraStream;


let isAdmin=false;






const audio =
document.getElementById("audio");








function showScreen(id){


document.querySelectorAll(".screen")

.forEach(s=>{


s.classList.remove("active");


});



document.getElementById(id)

.classList.add("active");


}








function randomID(){


return Math.random()

.toString(36)

.substring(2,10);


}








function randomRoom(){


return Math.floor(

1000+

Math.random()*9000

);


}









async function getAudio(){


audioStream =

await navigator.mediaDevices.getUserMedia({

audio:true

});


}









function startPeer(){


peer = new Peer();



peer.on("open",id=>{


myPeerID=id;



});






peer.on("call",call=>{


call.answer(audioStream);



call.on("stream",stream=>{


audio.srcObject=stream;


});


});



}









async function addPlayer(){


playerID=randomID();



await set(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),


{


name:playerName,

peer:myPeerID,

online:true,

camera:false


}

);



onDisconnect(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

)

)

.update({

online:false,

camera:false

});


}









function sendMessage(text){


push(

ref(

db,

"rooms/"+roomCode+
"/messages"

),

{

text:text,

time:Date.now()

}

);


}









function watchPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/players"

),


snap=>{


let box =
document.getElementById("players");


box.innerHTML="👥 Players<br>";



let data=snap.val();



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML +=


(p.online?"🟢 ":"🔴 ")

+p.name+

(p.camera?" 📹":"")+

"<br>";



});


}



});


}









function watchChat(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/messages"

),


snap=>{


let box =
document.getElementById("chat");


box.innerHTML="💬 Chat<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+

"<br>";



});


}



});


}
// ===============================
// CREATE ROOM
// ===============================


document.getElementById("create")
.onclick = async()=>{


playerName =
document.getElementById("name").value;


if(!playerName){

alert("Enter your name");

return;

}



await getAudio();

startPeer();



peer.on("open",async()=>{


roomCode=randomRoom();



await set(

ref(

db,

"rooms/"+roomCode

),

{

created:true,

admin:null

}

);



await addPlayer();



showScreen("radio");



document.getElementById("roomText")
.innerHTML=

"Room: "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();



});



};









// ===============================
// JOIN ROOM
// ===============================


document.getElementById("join")
.onclick = async()=>{


playerName =
document.getElementById("name").value;



roomCode =
document.getElementById("room").value;



if(!playerName || !roomCode){

alert("Enter name and room");

return;

}



let room = await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



await getAudio();


startPeer();



peer.on("open",async()=>{


await addPlayer();



showScreen("radio");



document.getElementById("roomText")
.innerHTML=

"Room: "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();



});



};









// ===============================
// ADMIN LOGIN BUTTON
// ===============================


document.getElementById("adminLogin")
.onclick=()=>{


showScreen("adminLoginScreen");


};









// ===============================
// ADMIN ENTER
// ===============================


document.getElementById("adminEnter")
.onclick=async()=>{


let code =

document.getElementById("adminCode").value;



roomCode =

document.getElementById("adminRoom").value;



if(code !== "1234"){

alert("Wrong code");

return;

}



let room = await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



await getAudio();


startPeer();



peer.on("open",async()=>{


isAdmin=true;



await set(

ref(

db,

"rooms/"+roomCode+"/admin"

),

{

peer:myPeerID,

online:true

}

);



showScreen("admin");



document.getElementById("adminRoomText")
.innerHTML=

"Room: "+roomCode;



sendMessage(

"👑 ADMIN joined"

);



});



};

// ===============================
// VOICE CONNECTION SYSTEM
// ===============================


let calls = {};





function callPeer(id){


if(id===myPeerID)
return;



if(calls[id])
return;



let call = peer.call(

id,

audioStream

);



calls[id]=call;



call.on("stream",s=>{


audio.srcObject=s;


});



call.on("close",()=>{


delete calls[id];


});


}








function watchConnections(){


if(!roomCode)
return;



// Connect to players

onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),


snap=>{


let players=snap.val();



if(players){


Object.values(players)

.forEach(p=>{


if(p.peer && p.peer!==myPeerID){


callPeer(p.peer);


}


});


}



});





// Connect to admin

onValue(

ref(

db,

"rooms/"+roomCode+"/admin"

),


snap=>{


let admin=snap.val();



if(admin && admin.peer!==myPeerID){


callPeer(admin.peer);


}



});


}








// ===============================
// PUSH TO TALK
// ===============================



function startTalking(){


if(audioStream){


audioStream
.getAudioTracks()[0]
.enabled=true;


}


}






function stopTalking(){


if(audioStream){


audioStream
.getAudioTracks()[0]
.enabled=false;


}


}






document.getElementById("talk")
.onmousedown=startTalking;


document.getElementById("talk")
.onmouseup=stopTalking;




document.getElementById("talk")
.ontouchstart=e=>{


e.preventDefault();

startTalking();


};





document.getElementById("talk")
.ontouchend=e=>{


e.preventDefault();

stopTalking();


};









// ===============================
// ADMIN TALK ALL
// ===============================



document.getElementById("adminTalk")
.onmousedown=startTalking;


document.getElementById("adminTalk")
.onmouseup=stopTalking;



document.getElementById("adminTalk")
.ontouchstart=e=>{


e.preventDefault();

startTalking();


};



document.getElementById("adminTalk")
.ontouchend=e=>{


e.preventDefault();

stopTalking();


};






// Start connections after joining

setTimeout(()=>{


watchConnections();


},2000);

// ===============================
// BODYCAM SYSTEM
// ===============================


let cameraCall;






// PLAYER START CAMERA


document.getElementById("camera")
.onclick=async()=>{


if(cameraStream){

return;

}



cameraStream =
await navigator.mediaDevices.getUserMedia({

video:true

});



await update(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

camera:true

}

);



sendMessage(

"📹 "+playerName+" bodycam ON"

);



};









// PLAYER STOP CAMERA


document.getElementById("stopCamera")
.onclick=async()=>{


if(cameraStream){


cameraStream
.getTracks()
.forEach(t=>t.stop());


cameraStream=null;


}



await update(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

camera:false

}

);



sendMessage(

"⛔ "+playerName+" bodycam OFF"

);


};









// ===============================
// ADMIN VIEW PLAYER CAMERAS
// ===============================



function watchAdminCameras(){


onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),


snap=>{


let box =
document.getElementById("adminPlayers");


box.innerHTML="👥 Players<br>";



let data=snap.val();



if(data){


Object.entries(data)

.forEach(([id,p])=>{


box.innerHTML +=


(p.online?"🟢 ":"🔴 ")

+p.name;



if(p.camera){


box.innerHTML +=

" 📹 <button onclick=\"viewCamera('"

+id+

"')\">VIEW</button>";



}



box.innerHTML+="<br>";



});



}



});


}








// ===============================
// ADMIN REQUEST CAMERA
// ===============================



window.viewCamera=function(id){



onValue(

ref(

db,

"rooms/"+roomCode+
"/players/"+id

),


snap=>{


let p=snap.val();



if(!p || !p.peer){

return;

}



let call = peer.call(

p.peer,

audioStream

);





call.on("stream",s=>{


let video =
document.createElement("video");


video.autoplay=true;


video.srcObject=s;



document.getElementById("cameraView")

.innerHTML="📹 BODYCAM<br>";



document.getElementById("cameraView")

.appendChild(video);



});



});


};

// ===============================
// STATUS BUTTONS
// ===============================


document.getElementById("help")
.onclick=()=>{


sendMessage(

"🚨 "+playerName+" needs help!"

);


};






document.getElementById("dead")
.onclick=()=>{


sendMessage(

"💀 "+playerName+" is dead"

);


};






document.getElementById("alive")
.onclick=()=>{


sendMessage(

"✅ "+playerName+" is alive"

);


};









// ===============================
// ADMIN PLAYER LIST
// ===============================


function watchAdminPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),


snap=>{


let box =
document.getElementById("adminPlayers");


box.innerHTML="👥 PLAYERS<br>";



let data=snap.val();



if(data){


Object.entries(data)

.forEach(([id,p])=>{


box.innerHTML +=


(p.online?"🟢 ":"🔴 ")

+p.name;



if(p.camera){


box.innerHTML += " 📹";


}



box.innerHTML+="<br>";



});


}



});


}









// ===============================
// AUTO START ADMIN WATCH
// ===============================


setTimeout(()=>{


if(isAdmin){


watchAdminPlayers();

watchAdminCameras();


}



},2500);









// ===============================
// LEAVE SAFELY
// ===============================


window.addEventListener(

"beforeunload",

()=>{


if(playerID && roomCode && !isAdmin){



set(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

online:false,

camera:false

}

);



sendMessage(

"🔴 "+playerName+" left"

);



}



if(isAdmin && roomCode){


set(

ref(

db,

"rooms/"+roomCode+"/admin"

),

{

online:false

}

);


}



});





</script>


</body>

</html>
