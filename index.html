<!DOCTYPE html>
<html>

<head>

<title>Game Radio v4</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


.screen{
    display:none;
}


.active{
    display:block;
}


input,button{

    font-size:20px;
    padding:12px;
    margin:8px;
    border-radius:12px;
    border:none;

}


#create{
    background:#2196f3;
    color:white;
}


#join{
    background:#673ab7;
    color:white;
}


#adminLogin{
    background:#444;
    color:white;
}


#talk{

    width:220px;
    height:220px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:35px;

}



#adminTalk{

    width:220px;
    height:220px;
    border-radius:50%;
    background:gold;
    color:black;
    font-size:30px;

}



#help{
    background:red;
    color:white;
}


#dead{
    background:black;
    color:white;
}


#alive{
    background:green;
    color:white;
}



.box{

    background:#222;
    margin:15px;
    padding:15px;
    border-radius:15px;
    height:180px;
    overflow:auto;
    text-align:left;

}


</style>


</head>


<body>


<!-- LOGIN -->


<div id="login" class="screen active">


<h1>📻 GAME RADIO</h1>


<input id="name" placeholder="Name">


<br>


<input id="room" placeholder="Room code">


<br>


<button id="create">
CREATE ROOM
</button>


<button id="join">
JOIN ROOM
</button>


<br>


<button id="adminLogin">
👑 ADMIN LOGIN
</button>


</div>







<!-- PLAYER RADIO -->


<div id="radio" class="screen">


<h1>📻 RADIO</h1>


<h2 id="roomText"></h2>



<div id="players" class="box">

👥 Players

</div>



<div id="chat" class="box">

💬 Chat

</div>




<button id="talk">

🎤
<br>

TALK

</button>



<br>


<button id="help">

🚨 HELP

</button>


<button id="dead">

💀 DEAD

</button>


<button id="alive">

✅ ALIVE

</button>



</div>









<!-- ADMIN LOGIN -->


<div id="adminLoginScreen" class="screen">


<h1>👑 ADMIN</h1>


<input id="adminCode" placeholder="Code">


<br>


<input id="adminRoom" placeholder="Room">


<br>


<button id="adminEnter">

ENTER

</button>


</div>







<!-- ADMIN PANEL -->


<div id="admin" class="screen">


<h1>👑 ADMIN RADIO</h1>


<h2 id="adminRoomText"></h2>


<div id="adminPlayers" class="box">

Players

</div>


<button id="adminTalk">

👑
<br>

TALK ALL

</button>



</div>




<audio id="audio" autoplay></audio>
<script type="module">

import { initializeApp }
from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
set,
get,
push,
onValue,
onDisconnect,
update

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};



const db = getDatabase(
initializeApp(firebaseConfig)
);




let playerName="";

let roomCode="";

let playerID="";

let isAdmin=false;


let peer;

let myPeerID="";

let micStream;


let audio =
document.getElementById("audio");







function show(id){

document.querySelectorAll(".screen")

.forEach(x=>{

x.classList.remove("active");

});


document.getElementById(id)

.classList.add("active");

}







function id(){

return Math.random()

.toString(36)

.substring(2,10);

}







function newRoom(){

return Math.floor(

1000+

Math.random()*9000

);

}







async function getMic(){

micStream =
await navigator.mediaDevices.getUserMedia({

audio:true

});


micStream
.getAudioTracks()[0]
.enabled=false;

}







function sendMessage(text){


push(

ref(

db,

"rooms/"+roomCode+"/messages"

),

{

text:text,

time:Date.now()

}

);


}







async function addPlayer(){


playerID=id();



await set(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

name:playerName,

online:true,

peer:myPeerID

}

);



onDisconnect(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

)

)

.update({

online:false

});


}








function watchPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),

snap=>{


let box=document.getElementById("players");


if(!box)
return;


box.innerHTML="👥 Players<br>";



let data=snap.val();



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML +=

(p.online?"🟢 ":"🔴 ")

+p.name+

"<br>";



});


}



});


}







function watchChat(){


onValue(

ref(

db,

"rooms/"+roomCode+"/messages"

),

snap=>{


let box=document.getElementById("chat");


box.innerHTML="💬 Chat<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+

"<br>";



});


}



});


}









// CREATE ROOM


document.getElementById("create")

.onclick=async()=>{


playerName=
document.getElementById("name").value;



if(!playerName){

alert("Name?");

return;

}



await getMic();


roomCode=newRoom();



await set(

ref(

db,

"rooms/"+roomCode

),

{

created:true

}

);



show("radio");



document.getElementById("roomText")
.innerHTML=

"Room "+roomCode;



sendMessage(

"🟢 "+playerName+" created room"

);



watchPlayers();

watchChat();


};

// ===============================
// PEER VOICE SYSTEM
// ===============================


let calls = {};






function startPeer(){


peer = new Peer();



peer.on("open",async id=>{


myPeerID=id;



// save our peer id

if(playerID){


await update(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

peer:myPeerID

}

);


}



watchConnections();


});





// receive calls

peer.on("call",call=>{


call.answer(micStream);



call.on("stream",stream=>{


audio.srcObject=stream;


});


});


}









function callPlayer(peerID){



if(
peerID===myPeerID ||
calls[peerID]
)

return;



let call = peer.call(

peerID,

micStream

);



calls[peerID]=call;



call.on("stream",stream=>{


audio.srcObject=stream;


});


}









function watchConnections(){


onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),

snap=>{


let players=snap.val();



if(players){


Object.values(players)

.forEach(p=>{


if(p.peer){


callPlayer(p.peer);


}


});


}



});


}









// ===============================
// JOIN ROOM
// ===============================


document.getElementById("join")

.onclick=async()=>{


playerName =
document.getElementById("name").value;



roomCode =
document.getElementById("room").value;



if(!playerName || !roomCode){

alert("Fill everything");

return;

}



let check =
await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!check.exists()){

alert("Room does not exist");

return;

}



await getMic();


startPeer();



peer.on("open",async()=>{


await addPlayer();



show("radio");



document.getElementById("roomText")

.innerHTML=

"Room "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();


});


};









// ===============================
// PUSH TO TALK
// ===============================


function talkOn(){


if(micStream){


micStream

.getAudioTracks()[0]

.enabled=true;


}


}



function talkOff(){


if(micStream){


micStream

.getAudioTracks()[0]

.enabled=false;


}


}





let talk =
document.getElementById("talk");



talk.onmousedown=talkOn;

talk.onmouseup=talkOff;



talk.ontouchstart=e=>{

e.preventDefault();

talkOn();

};



talk.ontouchend=e=>{

e.preventDefault();

talkOff();

};



// ===============================
// ADMIN LOGIN BUTTON
// ===============================


document.getElementById("adminLogin")
.onclick=()=>{


show("adminLoginScreen");


};









// ===============================
// ADMIN ENTER
// ===============================


document.getElementById("adminEnter")

.onclick=async()=>{


let code =
document.getElementById("adminCode").value;



roomCode =
document.getElementById("adminRoom").value;



if(code!=="1234"){

alert("Wrong code");

return;

}



let room = await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



isAdmin=true;


await getMic();


startPeer();



peer.on("open",async()=>{


await set(

ref(

db,

"rooms/"+roomCode+"/admin"

),

{

peer:myPeerID,

online:true

}

);



show("admin");



document.getElementById("adminRoomText")

.innerHTML=

"Room "+roomCode;



watchAdmin();



});



};









// ===============================
// ADMIN PLAYER LIST
// ===============================


function watchAdmin(){


onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),

snap=>{


let box =
document.getElementById("adminPlayers");


box.innerHTML="👥 Players<br>";



let data=snap.val();



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML +=


(p.online?"🟢 ":"🔴 ")

+p.name+

"<br>";



});


}



});


}









// ===============================
// ADMIN TALK
// ===============================


document.getElementById("adminTalk")

.onmousedown=talkOn;


document.getElementById("adminTalk")

.onmouseup=talkOff;



document.getElementById("adminTalk")

.ontouchstart=e=>{


e.preventDefault();

talkOn();


};



document.getElementById("adminTalk")

.ontouchend=e=>{


e.preventDefault();

talkOff();


};









// ===============================
// STATUS BUTTONS
// ===============================


document.getElementById("help")

.onclick=()=>{


sendMessage(

"🚨 "+playerName+" needs help!"

);


};





document.getElementById("dead")

.onclick=()=>{


sendMessage(

"💀 "+playerName+" is dead"

);


};





document.getElementById("alive")

.onclick=()=>{


sendMessage(

"✅ "+playerName+" is alive"

);


};









// ===============================
// CLEAN LEAVE
// ===============================


window.addEventListener(

"beforeunload",

()=>{


if(playerID){


update(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

online:false

}

);


}



});
