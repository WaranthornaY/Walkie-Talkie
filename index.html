<!DOCTYPE html>
<html>

<head>

<title>Game Radio</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}


.screen{

display:none;

}


.active{

display:block;

}


input,button{

font-size:20px;
padding:12px;
margin:8px;
border-radius:15px;
border:none;

}



#create{

background:#2196f3;
color:white;

}


#join{

background:#673ab7;
color:white;

}



#talk{

width:220px;
height:220px;
border-radius:50%;
background:green;
color:white;
font-size:35px;

}



.box{

background:#222;
margin:15px;
padding:15px;
border-radius:15px;
height:160px;
overflow:auto;
text-align:left;

}



</style>


</head>



<body>


<div id="login" class="screen active">


<h1>📻 GAME RADIO</h1>


<input id="name" placeholder="Your name">


<br>


<input id="room" placeholder="Room code">


<br>


<button id="create">

CREATE ROOM

</button>


<button id="join">

JOIN ROOM

</button>


</div>





<div id="radio" class="screen">


<h1>📻 RADIO</h1>


<h2 id="roomText"></h2>



<div id="players" class="box">

Players

</div>



<div id="chat" class="box">

Chat

</div>



<button id="talk">

🎤
<br>

TALK

</button>


</div>





<audio id="audio" autoplay></audio>



<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>


<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
set,
get,
push,
onValue,
onDisconnect,
update

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";




const firebaseConfig={


apiKey:"AIzaSySyOUR_API_KEY_HERE",


authDomain:"walkie-talkie-c85b3.firebaseapp.com",


databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",


projectId:"walkie-talkie-c85b3",


storageBucket:"walkie-talkie-c85b3.firebasestorage.app",


messagingSenderId:"410149019048",


appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};


const db=getDatabase(

initializeApp(firebaseConfig)

);



let name="";

let room="";

let id="";

let peerID="";

let peer;

let mic;

let audio=document.getElementById("audio");

let calls={};





function show(x){

document.querySelectorAll(".screen")

.forEach(e=>e.classList.remove("active"));


document.getElementById(x)

.classList.add("active");

}




function randomID(){

return Math.random()

.toString(36)

.substring(2,9);

}



function randomRoom(){

return Math.floor(

1000+

Math.random()*9000

);

}




async function getMic(){


mic=await navigator.mediaDevices.getUserMedia({

audio:true

});


mic.getAudioTracks()[0].enabled=false;


}


// ===============================
// PEER VOICE
// ===============================


function startPeer(){


peer=new Peer();



peer.on("open",async(id)=>{


peerID=id;



if(id){


await update(

ref(

db,

"rooms/"+room+"/players/"+id

),

{

peer:peerID

}

);


}



watchConnections();



});






peer.on("call",(call)=>{


call.answer(mic);



call.on("stream",(stream)=>{


audio.srcObject=stream;


});


});


}







function connectTo(peerID){


if(peerID===peer.id)
return;


if(calls[peerID])
return;



let call=peer.call(

peerID,

mic

);



calls[peerID]=call;



call.on("stream",(stream)=>{


audio.srcObject=stream;


});


}









function watchConnections(){


onValue(

ref(

db,

"rooms/"+room+"/players"

),

snap=>{


let players=snap.val();



if(players){


Object.values(players)

.forEach(p=>{


if(p.peer){


connectTo(p.peer);


}



});


}



});


}









// ===============================
// PLAYER DATABASE
// ===============================


async function addPlayer(){



id=randomID();



await set(

ref(

db,

"rooms/"+room+"/players/"+id

),

{

name:name,

online:true,

peer:""

}

);



onDisconnect(

ref(

db,

"rooms/"+room+"/players/"+id

)

)

.update({

online:false

});


}









function messages(text){


push(

ref(

db,

"rooms/"+room+"/messages"

),

{

text:text,

time:Date.now()

}

);


}









function watchPlayers(){


onValue(

ref(

db,

"rooms/"+room+"/players"

),

snap=>{


let box=document.getElementById("players");


box.innerHTML="👥 Players<br>";



let data=snap.val();



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML+=


(p.online?"🟢 ":"🔴 ")

+p.name+"<br>";



});


}



});


}








function watchChat(){


onValue(

ref(

db,

"rooms/"+room+"/messages"

),

snap=>{


let box=document.getElementById("chat");


box.innerHTML="💬 Chat<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML+=m.text+"<br>";


});


}



});


}









// ===============================
// CREATE ROOM
// ===============================


document.getElementById("create").onclick=async()=>{


name=document.getElementById("name").value;



if(!name){

alert("Enter name");

return;

}



room=randomRoom();



await set(

ref(

db,

"rooms/"+room

),

{

created:true

}

);



await getMic();


await addPlayer();



startPeer();



show("radio");



document.getElementById("roomText").innerHTML=

"Room: "+room;



messages(

"🟢 "+name+" created room"

);



watchPlayers();

watchChat();



};









// ===============================
// JOIN ROOM
// ===============================


document.getElementById("join").onclick=async()=>{


name=document.getElementById("name").value;


room=document.getElementById("room").value;



if(!name || !room){

alert("Fill everything");

return;

}



let check=await get(

ref(

db,

"rooms/"+room

)

);



if(!check.exists()){

alert("Room not found");

return;

}



await getMic();


await addPlayer();


startPeer();



show("radio");



document.getElementById("roomText").innerHTML=

"Room: "+room;



messages(

"🟢 "+name+" joined"

);



watchPlayers();

watchChat();



};









// ===============================
// PUSH TO TALK
// ===============================


function talkOn(){


mic.getAudioTracks()[0].enabled=true;


}



function talkOff(){


mic.getAudioTracks()[0].enabled=false;


}



let talk=document.getElementById("talk");



talk.onmousedown=talkOn;


talk.onmouseup=talkOff;



talk.ontouchstart=(e)=>{


e.preventDefault();

talkOn();


};



talk.ontouchend=(e)=>{


e.preventDefault();

talkOff();


};
</script>

</body>

</html>
