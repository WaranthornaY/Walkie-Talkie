<!DOCTYPE html>
<html>
<head>
<title>Walkie Talkie</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

button {
    font-size: 22px;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}

input {
    font-size: 22px;
    padding: 10px;
    width: 200px;
}

#talk {
    background: green;
    color:white;
}

#mute {
    background: orange;
}

#exit {
    background:red;
    color:white;
}
</style>

</head>

<body>

<h1>🎙️ Walkie Talkie</h1>

<p id="status">Not connected</p>

<input id="room" placeholder="Room number">

<br>

<button onclick="host()">Create Room</button>
<button onclick="join()">Join Room</button>

<h2 id="roomID"></h2>


<hr>

<button id="talk">
🎤 Hold To Talk
</button>

<br>

<button id="mute">
🔊 Mute Speaker
</button>

<br>

<button id="exit">
🚪 Exit Room
</button>


<audio id="audio" autoplay></audio>


<script>

let peer;
let conn;
let call;

let micStream;
let remoteAudio = document.getElementById("audio");

let muted=false;



async function getMic(){

    try{

        micStream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        document.getElementById("status").innerHTML =
        "Microphone ready";

        return true;

    }
    catch(e){

        alert(
        "Please allow microphone permission"
        );

        return false;
    }
}



function setupPeer(){

    peer = new Peer();


    peer.on("open", id=>{

        document.getElementById("status").innerHTML =
        "Connected to server";

        return id;

    });


    peer.on("call", incoming=>{

        incoming.answer(micStream);

        incoming.on("stream", stream=>{

            remoteAudio.srcObject=stream;

        });

        call=incoming;

    });

}




async function host(){

    if(!await getMic()) return;


    setupPeer();


    peer.on("open", id=>{

        document.getElementById("roomID").innerHTML =
        "Room ID: "+id;

    });

}




async function join(){

    if(!await getMic()) return;


    let id =
    document.getElementById("room").value;


    setupPeer();


    peer.on("open", myid=>{


        call =
        peer.call(id,micStream);


        call.on("stream",stream=>{

            remoteAudio.srcObject=stream;

        });


        document.getElementById("status").innerHTML =
        "Connected!";

    });

}





let talkButton =
document.getElementById("talk");


talkButton.onmousedown=()=>{

    if(micStream){

        micStream.getAudioTracks()[0].enabled=true;

    }

};


talkButton.onmouseup=()=>{

    if(micStream){

        micStream.getAudioTracks()[0].enabled=false;

    }

};



talkButton.ontouchstart=()=>{

    micStream.getAudioTracks()[0].enabled=true;

};


talkButton.ontouchend=()=>{

    micStream.getAudioTracks()[0].enabled=false;

};





document.getElementById("mute").onclick=()=>{

    muted=!muted;

    remoteAudio.muted=muted;


    document.getElementById("mute").innerHTML =
    muted ?
    "🔇 Unmute Speaker":
    "🔊 Mute Speaker";

};





document.getElementById("exit").onclick=()=>{

    if(peer)
        peer.destroy();


    location.reload();

};


</script>


</body>
</html>
