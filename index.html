<!DOCTYPE html>
<html>

<head>

<title>Game Radio Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>


<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


.screen{
    display:none;
}


.active{
    display:block;
}


input{

    width:220px;
    padding:12px;
    font-size:20px;
    margin:8px;
    text-align:center;

}



button{

    padding:15px;
    margin:8px;
    font-size:20px;
    border-radius:15px;
    border:none;

}



#create{
    background:#2196f3;
    color:white;
}


#join{
    background:#673ab7;
    color:white;
}


#adminLogin{
    background:#444;
    color:white;
}


#adminEnter{
    background:gold;
    color:black;
}


#talk{

    width:210px;
    height:210px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:35px;

}


#talk:active{

    background:red;

}



#adminTalk{

    width:210px;
    height:210px;
    border-radius:50%;
    background:gold;
    color:black;
    font-size:30px;

}



#emergency{

    background:red;
    color:white;

}


#dead{

    background:black;
    color:white;

}


#alive{

    background:green;
    color:white;

}



#players,
#chat{

    background:#222;
    margin:15px;
    padding:15px;
    border-radius:15px;
    height:200px;
    overflow:auto;
    text-align:left;

}


#announcement{

    background:#555;
    color:white;

}



</style>

</head>



<body>



<div id="start" class="screen active">


<h1>🎮 GAME RADIO</h1>


<input id="name" placeholder="Player Name">


<br>


<input id="roomInput" placeholder="Room Code">



<br>


<button id="create">
CREATE ROOM
</button>


<button id="join">
JOIN ROOM
</button>



<br><br>


<button id="adminLogin">
👑 ADMIN LOGIN
</button>



</div>





<div id="adminLoginScreen" class="screen">


<h1>👑 ADMIN ACCESS</h1>


<input id="adminCode" placeholder="Code">


<br>


<input id="adminRoom" placeholder="Room">


<br>


<button id="adminEnter">
ENTER
</button>


</div>





<div id="radio" class="screen">


<h1>📻 GAME RADIO</h1>


<h2 id="roomText"></h2>


<div id="players">
Players:
</div>


<div id="chat">
Chat:
</div>



<button id="talk">

🎤
<br>
TALK

</button>



<br>


<button id="emergency">
🚨 HELP
</button>


<button id="dead">
💀 DEAD
</button>


<button id="alive">
✅ ALIVE
</button>



</div>





<div id="admin" class="screen">


<h1>👑 ADMIN RADIO</h1>


<h2 id="adminRoomText"></h2>


<div id="adminPlayers">
Players:
</div>



<div id="adminChat">
Chat:
</div>



<button id="adminTalk">

👑
<br>
TALK ALL

</button>



<br>


<input id="announcement"
placeholder="Announcement">


<br>


<button id="sendAnnouncement">

📢 SEND

</button>


</div>





<audio id="audio" autoplay></audio>
<script type="module">


import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,

ref,

set,

get,

push,

onValue,

onDisconnect

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";




const firebaseConfig = {

apiKey:"AIzaSyB7nRKSEoYA604vTIR-H8Lf64_60D-xOS8",

authDomain:"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"walkie-talkie-c85b3",

storageBucket:"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:"410149019048",

appId:"1:410149019048:web:5e5b3bd589613119d8d19d"

};



const db =
getDatabase(
initializeApp(firebaseConfig)
);





let peer;

let myPeerID;

let playerID;

let playerName;

let roomCode;

let stream;


let remoteAudio =
document.getElementById("audio");





function showScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>{

s.classList.remove("active");

});


document.getElementById(id)
.classList.add("active");

}







function randomID(){

return Math.random()
.toString(36)
.substring(2,10);

}






function randomRoom(){

return Math.floor(

1000+

Math.random()*9000

);

}







async function getMic(){


stream =
await navigator.mediaDevices.getUserMedia({

audio:true

});


stream.getAudioTracks()[0].enabled=false;


}







function startPeer(){


peer=new Peer();



peer.on("open",id=>{


myPeerID=id;


});




peer.on("call",incoming=>{


incoming.answer(stream);



incoming.on("stream",audio=>{


remoteAudio.srcObject=audio;


});


});


}









function sendMessage(text){



push(

ref(

db,

"rooms/"+roomCode+"/messages"

),


{

text:text,

time:Date.now()

}


);


}







async function addPlayer(){


playerID=randomID();



await set(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),


{

name:playerName,

peer:myPeerID,

online:true

}


);



onDisconnect(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

)

)

.update({

online:false

});


}









function watchPlayers(){



onValue(

ref(

db,

"rooms/"+roomCode+
"/players"

),


snap=>{


let data=snap.val();



let box =
document.getElementById("players");



box.innerHTML="👥 Players<br>";



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML +=

(p.online?"🟢 ":"🔴 ")

+p.name+
"<br>";



});


}



});


}







function watchChat(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/messages"

),


snap=>{


let box =
document.getElementById("chat");


box.innerHTML="💬 Chat<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+
"<br>";



});


}



});


}







// PLAYER CREATE ROOM


document.getElementById("create")
.onclick=async()=>{


playerName =
document.getElementById("name").value;



if(!playerName){

alert("Enter name");

return;

}



await getMic();


startPeer();



peer.on("open",async()=>{


roomCode=randomRoom();



await set(

ref(

db,

"rooms/"+roomCode

),

{

created:true

}

);



await addPlayer();



showScreen("radio");



document.getElementById("roomText")
.innerHTML=

"Channel "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();


});


};







// ADMIN LOGIN BUTTON


document.getElementById("adminLogin")
.onclick=()=>{


showScreen("adminLoginScreen");


};

// PLAYER JOIN ROOM

document.getElementById("join")
.onclick=async()=>{


playerName =
document.getElementById("name").value;


roomCode =
document.getElementById("roomInput").value;



if(!playerName || !roomCode){

alert("Enter name and room");

return;

}



let room =
await get(

ref(
db,
"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



await getMic();


startPeer();



peer.on("open",async()=>{


await addPlayer();



showScreen("radio");



document.getElementById("roomText")
.innerHTML=

"Channel "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();



});


};









// ADMIN ENTER


document.getElementById("adminEnter")
.onclick=async()=>{


let code =
document.getElementById("adminCode").value;


roomCode =
document.getElementById("adminRoom").value;



if(code !== "1234"){

alert("Wrong admin code");

return;

}



if(!roomCode){

alert("Enter room");

return;

}



let room =
await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!room.exists()){

alert("Room not found");

return;

}



await getMic();


startPeer();



peer.on("open",async()=>{


await set(

ref(

db,

"rooms/"+roomCode+
"/admin"

),

{


peer:myPeerID,


online:true


}

);



showScreen("admin");



document.getElementById("adminRoomText")
.innerHTML=

"Channel "+roomCode;



sendMessage(

"👑 ADMIN joined"

);



watchAdminPlayers();

watchAdminChat();



});


};









function watchAdminPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/players"

),


snap=>{


let box =
document.getElementById("adminPlayers");


box.innerHTML=
"👥 Players<br>";



let data=snap.val();



if(data){


Object.values(data)

.forEach(p=>{


box.innerHTML +=


(p.online?"🟢 ":"🔴 ")

+p.name+

"<br>";



});


}



});


}








function watchAdminChat(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/messages"

),


snap=>{


let box =
document.getElementById("adminChat");


box.innerHTML=
"💬 Chat<br>";



let data=snap.val();



if(data){


Object.values(data)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+
"<br>";



});


}



});


}

// =========================
// VOICE CONNECTION
// =========================


function connectToPlayer(peerID){


if(peerID===myPeerID)
return;



let call =
peer.call(

peerID,

stream

);



call.on("stream",audio=>{


remoteAudio.srcObject=audio;


});


}







function connectAllPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/players"

),


snap=>{


let players=snap.val();



if(players){


Object.values(players)

.forEach(p=>{


if(p.peer){

connectToPlayer(p.peer);

}


});


}



});


}









// PLAYER TALK BUTTON


const talk =
document.getElementById("talk");



function talkOn(){


if(stream){

stream.getAudioTracks()[0].enabled=true;

}


}



function talkOff(){


if(stream){

stream.getAudioTracks()[0].enabled=false;

}


}



talk.onmousedown=talkOn;


talk.onmouseup=talkOff;



talk.ontouchstart=e=>{

e.preventDefault();

talkOn();

};



talk.ontouchend=e=>{

e.preventDefault();

talkOff();

};








// ADMIN TALK BUTTON


const adminTalk =
document.getElementById("adminTalk");



adminTalk.onmousedown=()=>{


stream.getAudioTracks()[0].enabled=true;



};




adminTalk.onmouseup=()=>{


stream.getAudioTracks()[0].enabled=false;



};






adminTalk.ontouchstart=e=>{

e.preventDefault();

stream.getAudioTracks()[0].enabled=true;

};



adminTalk.ontouchend=e=>{

e.preventDefault();

stream.getAudioTracks()[0].enabled=false;

};









// PLAYER ALERT BUTTONS


document.getElementById("emergency")
.onclick=()=>{


sendMessage(

"🚨 "+playerName+" needs help!"

);


};






document.getElementById("dead")
.onclick=()=>{


sendMessage(

"💀 "+playerName+" is dead!"

);


};






document.getElementById("alive")
.onclick=()=>{


sendMessage(

"✅ "+playerName+" is alive!"

);


};









// ADMIN TEXT ANNOUNCEMENT


document.getElementById("sendAnnouncement")
.onclick=()=>{


let text =
document.getElementById("announcement")
.value;



if(text){


sendMessage(

"👑 ADMIN: "+text

);



document.getElementById("announcement")
.value="";


}



};

// =========================
// CONNECT ADMIN / PLAYERS
// =========================


// When admin joins, connect to players

onValue(

ref(

db,

"rooms/"+roomCode+"/players"

),

snap=>{


let players=snap.val();


if(players){


Object.values(players)

.forEach(p=>{


if(p.peer && p.peer!==myPeerID){


connectToPlayer(p.peer);


}


});


}


});








// When player joins, connect to admin

onValue(

ref(

db,

"rooms/"+roomCode+"/admin"

),

snap=>{


let admin=snap.val();



if(admin && admin.peer!==myPeerID){


connectToPlayer(admin.peer);


}



});









// Leave system

window.addEventListener(

"beforeunload",

()=>{


if(roomCode && playerID){



set(

ref(

db,

"rooms/"+roomCode+

"/players/"+playerID

),

{


name:playerName,

peer:myPeerID,

online:false


}


);



sendMessage(

"🔴 "+playerName+" left"

);



}



}

);









</script>


</body>

</html>
