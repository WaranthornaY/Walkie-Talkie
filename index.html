<!DOCTYPE html>
<html>

<head>

<title>Game Radio v5</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.screen{
    display:none;
}

.active{
    display:block;
}

input,button{
    font-size:20px;
    padding:12px;
    margin:8px;
    border-radius:15px;
    border:none;
}


#create{
    background:#2196f3;
    color:white;
}

#join{
    background:#673ab7;
    color:white;
}


#talk{

    width:220px;
    height:220px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:35px;

}


.box{

    background:#222;
    margin:15px;
    padding:15px;
    border-radius:15px;
    height:160px;
    overflow:auto;
    text-align:left;

}


</style>

</head>


<body>


<div id="login" class="screen active">

<h1>📻 GAME RADIO</h1>


<input id="name" placeholder="Your name">


<br>


<input id="room" placeholder="Room code">


<br>


<button id="create">
CREATE ROOM
</button>


<button id="join">
JOIN ROOM
</button>


</div>






<div id="radio" class="screen">


<h1>📻 RADIO</h1>


<h2 id="roomText"></h2>



<div id="players" class="box">
👥 Players
</div>



<div id="chat" class="box">
💬 Chat
</div>



<button id="talk">

🎤
<br>
TALK

</button>



</div>






<audio id="audio" autoplay></audio>



<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>



<script type="module">


import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
set,
get,
push,
onValue,
update,
onDisconnect

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";





const firebaseConfig = {


apiKey: "YOUR_API_KEY",

authDomain:
"walkie-talkie-c85b3.firebaseapp.com",

databaseURL:
"https://walkie-talkie-c85b3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"walkie-talkie-c85b3",

storageBucket:
"walkie-talkie-c85b3.firebasestorage.app",

messagingSenderId:
"410149019048",

appId:
"1:410149019048:web:5e5b3bd589613119d8d19d"

};




const app = initializeApp(firebaseConfig);

const db = getDatabase(app);





let playerName="";

let roomCode="";

let playerID="";

let peerID="";


let peer;


let mic;


let calls={};


let audio =
document.getElementById("audio");





function show(id){

document.querySelectorAll(".screen")

.forEach(x=>{

x.classList.remove("active");

});


document.getElementById(id)

.classList.add("active");

}







function randomID(){

return Math.random()

.toString(36)

.substring(2,10);

}







function randomRoom(){

return Math.floor(

1000+

Math.random()*9000

);

}







async function getMic(){


mic = await navigator.mediaDevices.getUserMedia({

audio:true

});


mic.getAudioTracks()[0].enabled=false;


}


// ===============================
// CREATE PLAYER ID
// ===============================


function createPlayerID(){

playerID=randomID();

}





// ===============================
// SEND MESSAGE
// ===============================


function sendMessage(text){


push(

ref(

db,

"rooms/"+roomCode+"/messages"

),

{

text:text,

time:Date.now()

}

);


}







// ===============================
// ADD PLAYER TO FIREBASE
// ===============================


async function addPlayer(){


createPlayerID();



await set(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

),

{

name:playerName,

peer:"",

online:true

}

);



onDisconnect(

ref(

db,

"rooms/"+roomCode+
"/players/"+playerID

)

)

.update({

online:false

});


}









// ===============================
// WATCH PLAYERS
// ===============================


function watchPlayers(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/players"

),


snapshot=>{


let box=document.getElementById("players");


box.innerHTML="👥 Players<br>";



let players=snapshot.val();



if(players){


Object.values(players)

.forEach(p=>{


box.innerHTML +=

(p.online?"🟢 ":"🔴 ")

+p.name+

"<br>";


});


}



});


}









// ===============================
// WATCH CHAT
// ===============================


function watchChat(){


onValue(

ref(

db,

"rooms/"+roomCode+
"/messages"

),


snapshot=>{


let box=document.getElementById("chat");


box.innerHTML="💬 Chat<br>";



let messages=snapshot.val();



if(messages){


Object.values(messages)

.sort((a,b)=>a.time-b.time)

.forEach(m=>{


box.innerHTML +=

m.text+

"<br>";


});


}



});


}









// ===============================
// CREATE ROOM BUTTON
// ===============================


document.getElementById("create")

.onclick=async()=>{


playerName=

document.getElementById("name").value;



if(!playerName){

alert("Enter your name");

return;

}



roomCode=randomRoom();



await set(

ref(

db,

"rooms/"+roomCode

),

{

created:true

}

);



await getMic();


await addPlayer();



show("radio");



document.getElementById("roomText")

.innerHTML=

"Room: "+roomCode;



sendMessage(

"🟢 "+playerName+" created room"

);



watchPlayers();

watchChat();



};









// ===============================
// JOIN ROOM BUTTON
// ===============================


document.getElementById("join")

.onclick=async()=>{


playerName=

document.getElementById("name").value;



roomCode=

document.getElementById("room").value;



if(!playerName || !roomCode){

alert("Enter name and room");

return;

}



let roomCheck=

await get(

ref(

db,

"rooms/"+roomCode

)

);



if(!roomCheck.exists()){


alert("Room not found");


return;

}



await getMic();


await addPlayer();



show("radio");



document.getElementById("roomText")

.innerHTML=

"Room: "+roomCode;



sendMessage(

"🟢 "+playerName+" joined"

);



watchPlayers();

watchChat();



};
